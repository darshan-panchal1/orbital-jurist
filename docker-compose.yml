version: '3.8'

services:
  orbital-jurist:
    build: .
    container_name: orbital-jurist
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_JSON=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  data:
  results:
  logs: